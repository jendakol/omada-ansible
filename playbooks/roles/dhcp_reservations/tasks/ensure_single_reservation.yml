---
# Ensure a single DHCP reservation
# Called per reservation from ensure_reservation.yml

- name: Get MAC address for device {{ reservation_item.device }}
  set_fact:
    _device_mac_raw: "{{ _device_mac_map[reservation_item.device] }}"
  tags: [dhcp]

- name: Normalize MAC address format to Omada Controller format (uppercase with dashes)
  set_fact:
    _device_mac: "{{ _device_mac_raw | upper | regex_replace(':', '-') }}"
  tags: [dhcp]

- name: Find device details from devices list
  set_fact:
    _device_details: "{{ devices | selectattr('name', 'equalto', reservation_item.device) | first }}"
  tags: [dhcp]

- name: Find existing reservation by MAC address
  set_fact:
    _existing_reservation: >-
      {{
        omada_dhcp_existing
        | selectattr('mac', 'equalto', _device_mac)
        | list
        | first
        | default('')
      }}
  tags: [dhcp]

- name: Debug existing reservation match
  debug:
    msg: "Reservation for {{ _device_mac }}: {{ 'Found' if _existing_reservation != '' else 'Not found' }}"
  when: omada_api_debug | default(false)
  tags: [dhcp]

- name: Build DHCP reservation configuration
  set_fact:
    _reservation_config:
      netId: "{{ _current_network.id }}"
      mac: "{{ _device_mac }}"
      clientName: "{{ _device_details.hostname | default(reservation_item.device) }}"
      ip: "{{ reservation_item.ip }}"
      ipStart: "{{ _dhcp_pool_start }}"
      ipEnd: "{{ _dhcp_pool_end }}"
      description: "{{ _device_details.description | default(reservation_item.description | default('')) }}"
      status: "{{ reservation_item.enabled | default(true) }}"
      options: []
  tags: [dhcp]

- name: Debug reservation config
  debug:
    var: _reservation_config
  when: omada_api_debug | default(false)
  tags: [dhcp]

- name: Create DHCP reservation for {{ _device_mac }} if it doesn't exist
  uri:
    url: "{{ omada_api_base }}/setting/service/dhcp"
    method: POST
    headers: "{{ omada_headers }}"
    body_format: json
    body: "{{ _reservation_config }}"
    validate_certs: "{{ verify_ssl | default(true) }}"
    status_code: [200, 201]
    return_content: true
  register: _create_reservation_result
  when: _existing_reservation == '' or _existing_reservation is none
  changed_when: _create_reservation_result.status in [200, 201] and (_create_reservation_result.json.errorCode | default(1)) == 0
  failed_when: (_create_reservation_result.status | default(-1) | int) > 0 and (_create_reservation_result.status not in [200, 201] or (_create_reservation_result.json.errorCode | default(1)) != 0)
  retries: "{{ omada_api_retries | default(3) }}"
  delay: "{{ omada_api_retry_delay | default(5) }}"
  until: _create_reservation_result.status | default(-1) | int > 0
  tags: [dhcp]

- name: Update DHCP reservation for {{ _device_mac }} if it exists
  uri:
    url: "{{ omada_api_base }}/setting/service/dhcp/{{ _device_mac }}"
    method: PUT
    headers: "{{ omada_headers }}"
    body_format: json
    body: "{{ _reservation_config }}"
    validate_certs: "{{ verify_ssl | default(true) }}"
    status_code: [200, 204]
    return_content: true
  register: _update_reservation_result
  when: _existing_reservation != '' and _existing_reservation is not none
  changed_when: _update_reservation_result.status in [200, 204] and (_update_reservation_result.json.errorCode | default(0)) == 0
  failed_when: (_update_reservation_result.status | default(-1) | int) > 0 and (_update_reservation_result.status not in [200, 204] or (_update_reservation_result.json.errorCode | default(1)) != 0)
  retries: "{{ omada_api_retries | default(3) }}"
  delay: "{{ omada_api_retry_delay | default(5) }}"
  until: _update_reservation_result.status | default(-1) | int > 0
  tags: [dhcp]

- name: Debug reservation operation result
  debug:
    msg: "Reservation {{ _device_mac }}: {{ 'Created' if _create_reservation_result is defined and _create_reservation_result.changed else 'Updated' if _update_reservation_result is defined and _update_reservation_result.changed else 'No changes' }}"
  when: omada_api_debug | default(false)
  tags: [dhcp]
