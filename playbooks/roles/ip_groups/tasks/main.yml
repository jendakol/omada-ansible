---
# IP Group and IP-Port Group management via Omada Controller API v2
# Manages IP address groups and IP-Port groups for use in firewall ACL rules

- name: Skip IP group configuration when not defined
  debug:
    msg: "No IP groups or IP-Port groups defined - skipping configuration"
  when: (ip_groups | default([]) | length == 0) and (ip_port_groups | default([]) | length == 0)
  tags: [ip_groups]

- name: Fetch existing IP groups from controller (type=0)
  uri:
    url: "{{ omada_api_base }}/setting/profiles/groups?type=0&currentPage=1&currentPageSize=50"
    method: GET
    headers: "{{ omada_headers }}"
    validate_certs: "{{ verify_ssl | default(true) }}"
    status_code: [200]
    return_content: true
  register: omada_ip_groups_resp
  changed_when: false
  failed_when: omada_ip_groups_resp.status != 200 or (omada_ip_groups_resp.json.errorCode | default(1)) != 0
  retries: "{{ omada_api_retries | default(3) }}"
  delay: "{{ omada_api_retry_delay | default(5) }}"
  until: omada_ip_groups_resp.status | default(-1) | int > 0
  when: (ip_groups | default([]) | length > 0) or (ip_port_groups | default([]) | length > 0)
  tags: [ip_groups]

- name: Fetch existing IP-Port groups from controller (type=1)
  uri:
    url: "{{ omada_api_base }}/setting/profiles/groups?type=1&currentPage=1&currentPageSize=50"
    method: GET
    headers: "{{ omada_headers }}"
    validate_certs: "{{ verify_ssl | default(true) }}"
    status_code: [200]
    return_content: true
  register: omada_ip_port_groups_resp
  changed_when: false
  failed_when: omada_ip_port_groups_resp.status != 200 or (omada_ip_port_groups_resp.json.errorCode | default(1)) != 0
  retries: "{{ omada_api_retries | default(3) }}"
  delay: "{{ omada_api_retry_delay | default(5) }}"
  until: omada_ip_port_groups_resp.status | default(-1) | int > 0
  when: (ip_groups | default([]) | length > 0) or (ip_port_groups | default([]) | length > 0)
  tags: [ip_groups]

- name: Build map of existing IP groups (filter type=0)
  set_fact:
    omada_ip_groups_existing: "{{ (omada_ip_groups_resp.json.result.data | default(omada_ip_groups_resp.json.data | default([]))) | selectattr('type', 'equalto', 0) | list }}"
  when: omada_ip_groups_resp is defined
  tags: [ip_groups]

- name: Build map of existing IP-Port groups (filter type=1)
  set_fact:
    omada_ip_port_groups_existing: "{{ (omada_ip_port_groups_resp.json.result.data | default(omada_ip_port_groups_resp.json.data | default([]))) | selectattr('type', 'equalto', 1) | list }}"
  when: omada_ip_port_groups_resp is defined
  tags: [ip_groups]

- name: Initialize empty maps if not fetched
  set_fact:
    omada_ip_groups_existing: "{{ omada_ip_groups_existing | default([]) }}"
    omada_ip_port_groups_existing: "{{ omada_ip_port_groups_existing | default([]) }}"
  tags: [ip_groups]

- name: Debug existing groups
  debug:
    msg:
      - "Found {{ omada_ip_groups_existing | length }} existing IP group(s)"
      - "Found {{ omada_ip_port_groups_existing | length }} existing IP-Port group(s)"
  tags: [ip_groups]

- name: Ensure each IP group (type=0)
  include_tasks: ensure_ip_group.yml
  loop: "{{ ip_groups }}"
  loop_control:
    loop_var: ip_group_item
    label: "IP group: {{ ip_group_item.name }}"
  when: ip_groups | default([]) | length > 0
  vars:
    group_type: 0
  tags: [ip_groups]

- name: Ensure each IP-Port group (type=1)
  include_tasks: ensure_ip_group.yml
  loop: "{{ ip_port_groups }}"
  loop_control:
    loop_var: ip_group_item
    label: "IP-Port group: {{ ip_group_item.name }}"
  when: ip_port_groups | default([]) | length > 0
  vars:
    group_type: 1
  tags: [ip_groups]

- name: Build IP group name-to-ID mapping for ACL rules
  set_fact:
    omada_ip_group_map: "{{ dict(omada_ip_groups_existing | selectattr('name', 'defined') | map(attribute='name') | zip(omada_ip_groups_existing | selectattr('groupId', 'defined') | map(attribute='groupId'))) }}"
  when: omada_ip_groups_existing | length > 0
  tags: [ip_groups]

- name: Initialize empty IP group map if no groups exist
  set_fact:
    omada_ip_group_map: {}
  when: omada_ip_groups_existing | length == 0
  tags: [ip_groups]

- name: Debug IP group mapping
  debug:
    msg: "IP group name -> ID mapping: {{ omada_ip_group_map }}"
  when: omada_api_debug | default(false)
  tags: [ip_groups]

- name: Summary of IP group configuration
  debug:
    msg:
      - "Configured {{ ip_groups | default([]) | length }} IP group(s) successfully"
      - "Configured {{ ip_port_groups | default([]) | length }} IP-Port group(s) successfully"
  tags: [ip_groups]

- name: Find IP groups to clean up (not in playbook config)
  set_fact:
    _ip_groups_to_delete: >-
      {{
        omada_ip_groups_existing | default([])
        | selectattr('name', 'defined')
        | rejectattr('name', 'match', '.*Group_Any$')
        | rejectattr('name', 'in', ip_groups | default([]) | map(attribute='name') | list)
        | list
      }}
  when: omada_auto_cleanup | default(false)
  tags: [ip_groups, cleanup]

- name: Find IP-Port groups to clean up (not in playbook config)
  set_fact:
    _ip_port_groups_to_delete: >-
      {{
        omada_ip_port_groups_existing | default([])
        | selectattr('name', 'defined')
        | rejectattr('name', 'in', ip_port_groups | default([]) | map(attribute='name') | list)
        | list
      }}
  when: omada_auto_cleanup | default(false)
  tags: [ip_groups, cleanup]

- name: Warning about IP groups to be deleted
  debug:
    msg:
      - "WARNING: Auto-cleanup is enabled!"
      - "The following IP groups will be DELETED because they are not in the playbook:"
      - "IP groups: {{ _ip_groups_to_delete | default([]) | map(attribute='name') | list | join(', ') or 'none' }}"
      - "IP-Port groups: {{ _ip_port_groups_to_delete | default([]) | map(attribute='name') | list | join(', ') or 'none' }}"
  when: omada_auto_cleanup | default(false) and ((_ip_groups_to_delete | default([]) | length > 0) or (_ip_port_groups_to_delete | default([]) | length > 0))
  tags: [ip_groups, cleanup]

- name: Delete IP groups not defined in playbook (auto-cleanup)
  uri:
    url: "{{ omada_api_base }}/setting/profiles/groups/{{ item.type }}/{{ item.groupId }}"
    method: DELETE
    headers: "{{ omada_headers }}"
    validate_certs: "{{ verify_ssl | default(true) }}"
    status_code: [200, 204]
    return_content: true
  loop: "{{ _ip_groups_to_delete | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  register: _delete_ip_group_results
  retries: "{{ omada_api_retries | default(3) }}"
  delay: "{{ omada_api_retry_delay | default(5) }}"
  until: _delete_ip_group_results.status | default(-1) | int > 0
  when: omada_auto_cleanup | default(false) and (_ip_groups_to_delete | default([]) | length > 0)
  changed_when: _delete_ip_group_results.status in [200, 204]
  failed_when: _delete_ip_group_results.status not in [200, 204]
  tags: [ip_groups, cleanup]

- name: Delete IP-Port groups not defined in playbook (auto-cleanup)
  uri:
    url: "{{ omada_api_base }}/setting/profiles/groups/{{ item.type }}/{{ item.groupId }}"
    method: DELETE
    headers: "{{ omada_headers }}"
    validate_certs: "{{ verify_ssl | default(true) }}"
    status_code: [200, 204]
    return_content: true
  loop: "{{ _ip_port_groups_to_delete | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  register: _delete_ip_port_group_results
  retries: "{{ omada_api_retries | default(3) }}"
  delay: "{{ omada_api_retry_delay | default(5) }}"
  until: _delete_ip_port_group_results.status | default(-1) | int > 0
  when: omada_auto_cleanup | default(false) and (_ip_port_groups_to_delete | default([]) | length > 0)
  changed_when: _delete_ip_port_group_results.status in [200, 204]
  failed_when: _delete_ip_port_group_results.status not in [200, 204]
  tags: [ip_groups, cleanup]

- name: Summary of cleanup operations
  debug:
    msg:
      - "Deleted {{ _ip_groups_to_delete | default([]) | length }} IP group(s) not in playbook configuration"
      - "Deleted {{ _ip_port_groups_to_delete | default([]) | length }} IP-Port group(s) not in playbook configuration"
  when: omada_auto_cleanup | default(false) and (_ip_groups_to_delete | default([]) | length > 0)
  tags: [ip_groups, cleanup]
