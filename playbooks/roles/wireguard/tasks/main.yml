---
# WireGuard VPN configuration via Omada Controller API v2
# Manages WireGuard server and peer configurations

- name: Skip WireGuard when disabled or not defined
  debug:
    msg: "WireGuard is disabled or not configured - skipping VPN setup"
  when: wireguard_servers is not defined or (wireguard_servers | default([]) | length == 0)
  tags: [wireguard]

- name: Fetch existing WireGuard servers
  uri:
    url: "{{ omada_api_base }}/setting/wireguard?currentPage=1&currentPageSize=50"
    method: GET
    headers: "{{ omada_headers }}"
    validate_certs: "{{ verify_ssl | default(true) }}"
    status_code: [200, 404]
    return_content: true
  register: omada_wg_servers_resp
  changed_when: false
  failed_when: false
  tags: [wireguard]

- name: Check if WireGuard is supported
  set_fact:
    _wg_supported: "{{ omada_wg_servers_resp.status == 200 }}"
  tags: [wireguard]

- name: Warn if WireGuard not supported
  debug:
    msg: "WARNING: WireGuard API endpoint not available - feature may not be supported on this controller version or requires gateway device"
  when: not _wg_supported
  tags: [wireguard]

- name: End WireGuard configuration if not supported
  meta: end_host
  when: not _wg_supported
  tags: [wireguard]

- name: Build map of existing WireGuard servers
  set_fact:
    omada_wg_servers_existing: "{{ omada_wg_servers_resp.json.result.data | default(omada_wg_servers_resp.json.data | default([])) }}"
  tags: [wireguard]

- name: Debug existing WireGuard servers
  debug:
    msg: "Found {{ omada_wg_servers_existing | length }} existing WireGuard server(s)"
  tags: [wireguard]

- name: Ensure each WireGuard server
  include_tasks: ensure_wg_server.yml
  loop: "{{ wireguard_servers }}"
  loop_control:
    loop_var: wg_server_item
    label: "WireGuard server: {{ wg_server_item.name }}"
  when: wireguard_servers is defined and (wireguard_servers | length > 0)
  tags: [wireguard]

- name: Refresh WireGuard servers list after creation/update
  uri:
    url: "{{ omada_api_base }}/setting/wireguard?currentPage=1&currentPageSize=50"
    method: GET
    headers: "{{ omada_headers }}"
    validate_certs: "{{ verify_ssl | default(true) }}"
    status_code: [200]
    return_content: true
  register: omada_wg_servers_refreshed
  changed_when: false
  tags: [wireguard]

- name: Build WireGuard server name-to-ID mapping
  set_fact:
    omada_wg_server_map: "{{ dict(omada_wg_servers_refreshed.json.result.data | default(omada_wg_servers_refreshed.json.data | default([])) | map(attribute='name') | zip(omada_wg_servers_refreshed.json.result.data | default(omada_wg_servers_refreshed.json.data | default([])) | map(attribute='id'))) }}"
  tags: [wireguard]

- name: Debug WireGuard server mapping
  debug:
    msg: "WireGuard server name -> ID mapping: {{ omada_wg_server_map }}"
  when: omada_api_debug | default(false)
  tags: [wireguard]

- name: Summary of WireGuard configuration
  debug:
    msg: "Configured {{ wireguard_servers | length }} WireGuard server(s) successfully"
  when: wireguard_servers is defined
  tags: [wireguard]

- name: Find WireGuard servers to clean up (not in playbook config)
  set_fact:
    _wg_servers_to_delete: >-
      {{
        omada_wg_servers_existing | default([])
        | rejectattr('name', 'in', wireguard_servers | map(attribute='name') | list)
        | list
      }}
  when: wireguard_servers is defined and omada_auto_cleanup | default(false)
  tags: [wireguard, cleanup]

- name: Warning about WireGuard servers to be deleted
  debug:
    msg:
      - "WARNING: Auto-cleanup is enabled!"
      - "The following WireGuard servers will be DELETED because they are not in the playbook:"
      - "{{ _wg_servers_to_delete | map(attribute='name') | list | join(', ') }}"
  when: omada_auto_cleanup | default(false) and (_wg_servers_to_delete | default([]) | length > 0)
  tags: [wireguard, cleanup]

- name: Delete WireGuard servers not defined in playbook (auto-cleanup)
  uri:
    url: "{{ omada_api_base }}/setting/wireguard/{{ item.id }}"
    method: DELETE
    headers: "{{ omada_headers }}"
    validate_certs: "{{ verify_ssl | default(true) }}"
    status_code: [200, 204]
    return_content: true
  loop: "{{ _wg_servers_to_delete | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  register: _delete_wg_server_results
  retries: "{{ omada_api_retries | default(3) }}"
  delay: "{{ omada_api_retry_delay | default(5) }}"
  until: _delete_wg_server_results is succeeded
  when: omada_auto_cleanup | default(false) and (_wg_servers_to_delete | default([]) | length > 0)
  changed_when: _delete_wg_server_results.status in [200, 204]
  failed_when: _delete_wg_server_results.status not in [200, 204]
  tags: [wireguard, cleanup]

- name: Summary of cleanup operations
  debug:
    msg: "Deleted {{ _wg_servers_to_delete | default([]) | length }} WireGuard server(s) not in playbook configuration"
  when: omada_auto_cleanup | default(false) and (_wg_servers_to_delete | default([]) | length > 0)
  tags: [wireguard, cleanup]
