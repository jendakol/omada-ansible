---
# Cleanup Test Site
# Deletes "Test-Automation" site from production controller

- name: Cleanup Test Site
  hosts: omada-controller
  connection: local
  gather_facts: false
  vars:
    omada_api_debug: false
    test_site_name: "Test-Automation"

  tasks:
    - name: Authenticate to controller
      block:
        - name: Get controller info
          uri:
            url: "{{ omada_controller_url }}/api/info"
            method: GET
            validate_certs: "{{ verify_ssl | default(true) }}"
            status_code: [200]
            return_content: true
          register: controller_info

        - name: Extract controller ID
          set_fact:
            omada_controller_id: "{{ controller_info.json.result.omadacId }}"

        - name: Login to controller
          uri:
            url: "{{ omada_controller_url }}/{{ omada_controller_id }}/api/v2/login"
            method: POST
            body_format: json
            body:
              username: "{{ omada_username }}"
              password: "{{ omada_password }}"
            validate_certs: "{{ verify_ssl | default(true) }}"
            status_code: [200]
            return_content: true
          register: login_response

        - name: Extract authentication tokens
          set_fact:
            omada_session_id: "{{ login_response.cookies.TPOMADA_SESSIONID }}"
            omada_auth_token: "{{ login_response.json.result.token }}"

        - name: Build request headers
          set_fact:
            omada_headers:
              Content-Type: "application/json"
              Csrf-Token: "{{ omada_auth_token }}"
              Cookie: "TPOMADA_SESSIONID={{ omada_session_id }}"

    - name: Find test site
      uri:
        url: "{{ omada_controller_url }}/{{ omada_controller_id }}/api/v2/sites?currentPage=1&currentPageSize=50"
        method: GET
        headers: "{{ omada_headers }}"
        validate_certs: "{{ verify_ssl | default(true) }}"
        status_code: [200]
        return_content: true
      register: sites_response

    - name: Get test site details
      set_fact:
        test_site: >-
          {{
            sites_response.json.result.data
            | selectattr('name', 'equalto', test_site_name)
            | list
            | first
            | default('')
          }}

    - name: Check if test site exists
      debug:
        msg: "Test site '{{ test_site_name }}': {{ 'Found' if test_site != '' else 'Not found' }}"

    - name: Delete test site
      uri:
        url: "{{ omada_controller_url }}/{{ omada_controller_id }}/api/v2/sites/{{ test_site.id }}"
        method: DELETE
        headers: "{{ omada_headers }}"
        validate_certs: "{{ verify_ssl | default(true) }}"
        status_code: [200, 204]
        return_content: true
      when: test_site != ''
      register: delete_result

    - name: Display result
      debug:
        msg: "{{ 'Test site deleted successfully' if test_site != '' else 'Test site did not exist' }}"
